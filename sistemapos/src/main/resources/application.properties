# ===========================
# NAP POS - Configuración
# ===========================

# Spring Boot
spring.main.web-application-type=none
spring.main.banner-mode=off

# SQLite Database
spring.datasource.url=jdbc:sqlite:${user.home}/.nappos/nap_pos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.nap.pos=DEBUG

# ─── Correo saliente ─────────────────────────────────────────────
# Las credenciales SMTP se cargan desde un archivo externo que nunca
# se incluye en el JAR ni en el repositorio:
#   Windows: %USERPROFILE%\.nappos\mail.properties
#   Linux/macOS: ~/.nappos/mail.properties
# Si el archivo no existe, la función de recuperación de contraseña
# no estará disponible pero la app arranca igual.
spring.config.import=optional:file:${user.home}/.nappos/mail.properties

# Valores no sensibles (servidor y protocolo) — sí van en el JAR
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
